project:
  name: phenothiazine-screen
generation:
  engine: genmol
  mode: phenothiazine_derivative_generation
  external_genmol_path: null
  prompts:
    objective: generate phenothiazine derivatives suitable for downstream screening
screening:
  primary_objectives:
    - synthesizability
    - solubility
  secondary_objectives:
    - novelty
    - diversity
  use_external_scores: false
  shortlist_size: 3
pipeline:
  stages:
    - library_designer
    - standardizer
    - structure_expansion
    - patent_retrieval
    - scholarly_retrieval
    - page_corpus
    - document_fetch
    - figure_corpus
    - surrogate_screen
    - benchmark
    - knowledge_graph
    - ranker
    - critique
    - critique_reranker
    - knowledge_graph
    - reporter
    - dft_handoff
kg:
  backend: json
  path: artifacts/knowledge_graph.json
critique:
  enable_web_search: true
  max_candidates: 10
  search_fields:
    - phenothiazine
    - solubility
    - synthesizability
    - derivative
structure_expansion:
  enabled: true
  similarity_threshold: 90
  similarity_max_records: 5
  substructure_max_records: 5
  timeout: 20
patent_retrieval:
  enabled: true
  count: 5
  timeout: 20
scholarly_retrieval:
  enabled: true
  count: 5
  mode: broad
  max_queries: 6
  exact_query_budget: 1
  analog_query_budget: 3
  exploratory_query_budget: 2
page_corpus:
  enabled: true
document_fetch:
  enabled: true
  artifacts_dir: artifacts/page_assets
figure_corpus:
  enabled: true
  artifacts_dir: artifacts/figure_assets
search:
  backend: stub
  count: 5
  production_backend: planned_scholarly_api
