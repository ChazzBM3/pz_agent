project:
  name: phenothiazine-screen
generation:
  engine: genmol
  mode: phenothiazine_derivative_generation
  external_genmol_path: null
  prompts:
    objective: generate phenothiazine derivatives suitable for downstream screening
screening:
  primary_objectives:
    - synthesizability
    - solubility
  secondary_objectives:
    - novelty
    - diversity
  use_external_scores: false
  shortlist_size: 3
portfolio:
  budgets:
    exploit: 0.40
    explore: 0.25
    bridge: 0.25
    falsify: 0.10
pipeline:
  stages:
    - generation_agent
    - knowledge_graph
    - critique_agent
    - critique_reranker
    - simulation_planner
    - knowledge_graph
    - reporter
    - dft_handoff
kg:
  backend: json
  path: artifacts/knowledge_graph.json
critique:
  enable_web_search: true
  max_candidates: 10
  search_fields:
    - phenothiazine
    - solubility
    - synthesizability
    - derivative
structure_expansion:
  enabled: true
  similarity_threshold: 90
  similarity_max_records: 5
  substructure_max_records: 5
  timeout: 20
patent_retrieval:
  enabled: true
  count: 5
  timeout: 20
scholarly_retrieval:
  enabled: true
  count: 5
  mode: broad
  max_queries: 6
  exact_query_budget: 1
  analog_query_budget: 3
  exploratory_query_budget: 2
page_corpus:
  enabled: true
document_fetch:
  enabled: true
  artifacts_dir: artifacts/page_assets
  fetch_live: true
  timeout: 20
figure_corpus:
  enabled: true
  artifacts_dir: artifacts/figure_assets
ocr_caption:
  enabled: true
page_image_retrieval:
  enabled: true
  artifacts_dir: artifacts/page_image_retrieval
  top_k: 5
multimodal_rerank:
  enabled: true
  invoke_live: true
  model: gemini-2.5-flash
  timeout: 120
simulation_planner:
  enabled: true
search:
  backend: stub
  count: 5
  production_backend: planned_scholarly_api
