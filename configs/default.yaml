project:
  name: phenothiazine-screen
generation:
  engine: genmol
  mode: phenothiazine_derivative_generation
  prompts:
    objective: generate phenothiazine derivatives suitable for downstream screening
screening:
  primary_objectives:
    - synthesizability
    - solubility
  secondary_objectives:
    - novelty
    - diversity
pipeline:
  stages:
    - library_designer
    - standardizer
    - surrogate_screen
    - benchmark
    - knowledge_graph
    - ranker
    - critique
    - knowledge_graph
    - reporter
    - dft_handoff
kg:
  backend: json
  path: artifacts/knowledge_graph.json
critique:
  enable_web_search: true
  max_candidates: 10
  search_fields:
    - phenothiazine
    - solubility
    - synthesizability
    - derivative
search:
  backend: stub
  count: 5
  production_backend: planned_scholarly_api
