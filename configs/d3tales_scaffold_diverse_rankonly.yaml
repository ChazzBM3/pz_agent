project:
  name: phenothiazine-scaffold-diverse-rankonly
generation:
  engine: d3tales_csv
  mode: phenothiazine_derivative_generation
  external_genmol_path: null
  d3tales_csv_path: data/d3tales.csv
  d3tales_limit: 24
  d3tales_phenothiazine_only: false
  prompts:
    objective: rank a more scaffold-diverse D3TaLES batch with scaffold-aware support and novelty reranking
screening:
  primary_objectives:
    - synthesizability
    - solubility
  secondary_objectives:
    - novelty
    - diversity
  use_external_scores: false
  shortlist_size: 8
pipeline:
  stages:
    - library_designer
    - standardizer
    - surrogate_screen
    - benchmark
    - knowledge_graph
    - ranker
    - reporter
kg:
  backend: json
  path: artifacts/knowledge_graph.json
